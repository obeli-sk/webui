[build]
release = false
filehash = true
dist = "dist-dev"

[serve]
port = 8081

[watch]
ignore = ["../../target-sandbox", "target-sandbox", "dist-dev"]
[[proxy]]
# Only /api prefixed requests should be proxied:
# Remove /api path prefix using the rewrite rule, then add it back.
rewrite = "/api"
backend = "http://127.0.0.1:8080/api"

[tools]
wasm_opt = "version_129"
wasm_bindgen = "0.2.121"
